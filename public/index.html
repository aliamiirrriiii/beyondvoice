<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceAI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>

    <!-- ── Pre-call overlay ── -->
    <div id="precall" class="precall">
      <form id="join-form" class="precall-card">
        <div class="precall-header">
          <svg class="precall-icon" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <h1>VoiceAI</h1>
          <p class="precall-sub">Ultra-light voice calls</p>
        </div>

        <div id="mic-panel" class="mic-panel" aria-live="polite">
          <span id="mic-badge" class="mic-badge mic-badge-pending">Checking</span>
          <span id="mic-summary" class="mic-summary">Microphone access needed to join.</span>
          <span id="mic-details" class="mic-detail">Open over HTTPS, then tap Join.</span>
        </div>

        <label class="field">
          <span>Room</span>
          <input id="room-input" name="room" type="text" placeholder="demo-room" autocomplete="off" maxlength="48" required />
        </label>

        <label class="field">
          <span>Name</span>
          <input id="name-input" name="name" type="text" placeholder="Your name" autocomplete="nickname" maxlength="32" required />
        </label>

        <label class="field">
          <span>Opus Mode</span>
          <select id="opus-mode-select" name="opus-mode">
            <option value="saver">Data Saver</option>
            <option value="balanced">Balanced</option>
            <option value="quality">High Quality</option>
          </select>
          <span id="opus-mode-details" class="field-note">Balanced speech quality and bandwidth.</span>
        </label>

        <button id="join-button" type="submit" class="btn btn-join">Join room</button>
      </form>
    </div>

    <!-- ── In-call view ── -->
    <main class="call">

      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <span class="room-label" id="room-text">-</span>
          <span class="divider">|</span>
          <span class="status-label" id="status-text">Idle</span>
        </div>
        <div class="topbar-right">
          <span class="meta-chip" id="role-text">-</span>
          <button id="info-toggle" type="button" class="icon-btn icon-btn-sm" title="Toggle info panel">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          </button>
        </div>
      </header>

      <!-- Participant stage -->
      <section class="stage">
        <article class="tile tile-local">
          <div class="tile-avatar">
            <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <span class="tile-name" id="local-participant-name">You</span>
        </article>

        <article class="tile tile-remote">
          <div class="tile-avatar tile-avatar-remote">
            <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </div>
          <span class="tile-name" id="peer-text">Waiting</span>
        </article>
      </section>

      <!-- Bottom control bar -->
      <footer class="controls">
        <button id="mute-button" type="button" class="icon-btn" disabled title="Mute">
          <svg class="ic-mic" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <span class="btn-label">Mute</span>
        </button>

        <button id="speaker-button" type="button" class="icon-btn" title="Speaker">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          <span class="btn-label">Enable speaker</span>
        </button>

        <button id="leave-button" type="button" class="icon-btn icon-btn-end" disabled title="Leave">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 11.94 11.94 0 0 0 3.75.6 2 2 0 0 1 2 2v3.4a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 5.33 2h3.4a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L9.71 9.9"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          <span class="btn-label">Leave</span>
        </button>

        <button id="reconnect-button" type="button" class="icon-btn" disabled title="Reconnect">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/><path d="M20.49 15a9 9 0 0 1-14.85 3.36L1 14"/></svg>
          <span class="btn-label">Reconnect</span>
        </button>
      </footer>

      <!-- Side info panel (toggled) -->
      <aside id="info-panel" class="info-panel hidden">
        <div class="panel-section">
          <h3>Network</h3>
          <dl class="metrics">
            <div class="metric"><dt>RTT</dt><dd id="rtt-text">-</dd></div>
            <div class="metric"><dt>Jitter</dt><dd id="jitter-text">-</dd></div>
            <div class="metric"><dt>Loss</dt><dd id="loss-text">-</dd></div>
            <div class="metric"><dt>Bitrate</dt><dd id="bitrate-text">-</dd></div>
          </dl>
        </div>
        <div class="panel-section">
          <h3>Extreme</h3>
          <dl class="metrics">
            <div class="metric"><dt>Transport</dt><dd id="transport-mode-text">-</dd></div>
            <div class="metric"><dt>Header</dt><dd id="header-text">-</dd></div>
            <div class="metric"><dt>Buffer</dt><dd id="buffer-text">-</dd></div>
            <div class="metric"><dt>PLC</dt><dd id="plc-text">-</dd></div>
            <div class="metric metric-wide"><dt>Vocoder</dt><dd id="vocoder-text">-</dd></div>
          </dl>
        </div>
        <div class="panel-section">
          <div class="log-header">
            <h3>Log</h3>
            <button id="clear-log-button" type="button" class="text-btn">Clear</button>
          </div>
          <pre id="log-output" class="log-output"></pre>
        </div>
      </aside>
    </main>

    <audio id="remote-audio" autoplay playsinline></audio>
    <audio id="local-audio" autoplay playsinline muted></audio>

    <script src="/app-config.js"></script>
    <script src="/extreme-stack.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
